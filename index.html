<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>နေ့စဉ် အသုံးစရိတ် မှတ်တမ်း</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configure Tailwind for Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body {
            font-family: 'Padauk', sans-serif;
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Dark Mode Scrollbar */
        html.dark .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569; 
        }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-10 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="bg-indigo-600 dark:bg-slate-800 text-white shadow-md rounded-b-3xl transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-6 relative">
            <button id="theme-toggle" class="absolute right-4 top-6 p-2 rounded-full hover:bg-white/20 transition-colors" title="အလင်း/အမှောင် ပြောင်းရန်">
                <i data-lucide="moon" id="theme-icon" class="w-6 h-6"></i>
            </button>
            
            <div class="text-center">
                <h1 class="text-2xl md:text-3xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="wallet" class="w-8 h-8"></i>
                    နေ့စဉ် အသုံးစရိတ် မှတ်တမ်း
                </h1>
                <p class="text-indigo-200 dark:text-slate-400 mt-2 text-sm md:text-base">သင့်ရဲ့ ဘဏ္ဍာရေးကို အကောင်းဆုံး စီမံပါ</p>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 space-y-6">
        
        <!-- Summary & Budget Row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <!-- Balance Card -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 text-center transition-colors">
                <h2 class="text-xs md:text-sm text-slate-500 dark:text-slate-400 font-medium mb-1 md:mb-2 flex justify-center items-center gap-1.5"><i data-lucide="wallet-cards" class="w-4 h-4"></i> လက်ကျန်ငွေ</h2>
                <div class="text-xl md:text-2xl font-bold text-indigo-600 dark:text-indigo-400">
                    <span id="total-balance">၀</span><span class="text-sm font-normal ml-1">ကျပ်</span>
                </div>
            </div>
            <!-- Income Card -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 text-center transition-colors">
                <h2 class="text-xs md:text-sm text-slate-500 dark:text-slate-400 font-medium mb-1 md:mb-2 flex justify-center items-center gap-1.5"><i data-lucide="arrow-down-circle" class="w-4 h-4 text-emerald-500"></i> ဝင်ငွေ</h2>
                <div class="text-xl md:text-2xl font-bold text-emerald-500 dark:text-emerald-400">
                    <span id="total-income">၀</span><span class="text-sm font-normal ml-1">ကျပ်</span>
                </div>
            </div>
            <!-- Expense Card -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 text-center transition-colors">
                <h2 class="text-xs md:text-sm text-slate-500 dark:text-slate-400 font-medium mb-1 md:mb-2 flex justify-center items-center gap-1.5"><i data-lucide="arrow-up-circle" class="w-4 h-4 text-red-500"></i> ထွက်ငွေ</h2>
                <div class="text-xl md:text-2xl font-bold text-red-500 dark:text-red-400">
                    <span id="total-amount">၀</span><span class="text-sm font-normal ml-1">ကျပ်</span>
                </div>
            </div>
            <!-- Budget Card (New) -->
            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 transition-colors flex flex-col justify-center cursor-pointer hover:shadow-md" onclick="setBudget()" title="ဘတ်ဂျက် သတ်မှတ်ရန် နှိပ်ပါ။">
                <div class="flex justify-between items-center mb-1">
                    <h2 class="text-xs md:text-sm text-slate-500 dark:text-slate-400 font-medium flex items-center gap-1.5"><i data-lucide="target" class="w-4 h-4 text-amber-500"></i> ဒီလ ဘတ်ဂျက်</h2>
                    <span id="budget-percent" class="text-xs font-bold text-slate-600 dark:text-slate-300">0%</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5 mb-2 mt-1">
                    <div id="budget-bar" class="bg-amber-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div class="text-xs text-right text-slate-500 dark:text-slate-400">
                    <span id="budget-used">၀</span> / <span id="budget-total">မသတ်မှတ်ရသေး</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Form -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Add Form -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6 transition-colors">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-500 dark:text-indigo-400"></i>
                        မှတ်တမ်း အသစ်ထည့်ရန်
                    </h2>
                    
                    <form id="expense-form" class="space-y-4">
                        <!-- Type Selection -->
                        <div class="flex gap-4 mb-4 p-1 bg-slate-100 dark:bg-slate-700 rounded-lg">
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="trans_type" value="expense" checked class="peer sr-only">
                                <div class="py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-red-500 peer-checked:shadow-sm transition-all">
                                    ထွက်ငွေ
                                </div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input type="radio" name="trans_type" value="income" class="peer sr-only">
                                <div class="py-2 rounded-md text-sm font-medium text-slate-600 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-800 peer-checked:text-emerald-500 peer-checked:shadow-sm transition-all">
                                    ဝင်ငွေ
                                </div>
                            </label>
                        </div>

                        <!-- Description -->
                        <div id="desc-container" class="transition-all duration-300">
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">အကြောင်းအရာ</label>
                            <input type="text" id="desc" required placeholder="ဥပမာ - နေ့လည်စာ / မုန့်ဖိုး" 
                                class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                        </div>

                        <!-- Amount -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">ပမာဏ (ကျပ်)</label>
                            <input type="number" id="amount" required min="1" placeholder="ဥပမာ - 5000" 
                                class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500">
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">အမျိုးအစား</label>
                            <select id="category" required 
                                class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-white">
                                <!-- Options dynamically added -->
                            </select>
                        </div>

                        <!-- Date -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">ရက်စွဲ</label>
                            <input type="date" id="date" required 
                                class="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-white">
                        </div>

                        <!-- Submit -->
                        <button type="submit" id="submit-btn"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2 mt-4">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            <span id="btn-text">မှတ်သားမည်</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Charts & List -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <!-- Charts Row (Bar + Pie) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Bar Chart -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 transition-colors">
                        <h2 class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-wide">
                            <i data-lucide="bar-chart-3" class="w-4 h-4"></i> ၇ ရက်အတွင်း
                        </h2>
                        <div class="h-[200px] w-full">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
                    <!-- Pie Chart -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 transition-colors">
                        <h2 class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-4 flex items-center gap-2 uppercase tracking-wide">
                            <i data-lucide="pie-chart" class="w-4 h-4"></i> အသုံးစရိတ် အမျိုးအစားများ
                        </h2>
                        <div class="h-[200px] w-full flex justify-center">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- List & Controls -->
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 flex flex-col flex-1 min-h-[400px] transition-colors">
                    
                    <!-- Search, Filter & Actions -->
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2 whitespace-nowrap">
                            <i data-lucide="list" class="w-5 h-5 text-indigo-500 dark:text-indigo-400"></i>
                            မှတ်တမ်းများ
                        </h2>
                        
                        <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
                            <!-- Search -->
                            <div class="relative flex-1 md:w-48">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                                <input type="text" id="search-input" placeholder="ရှာဖွေရန်..." class="w-full pl-9 pr-3 py-1.5 text-sm border border-slate-300 dark:border-slate-600 rounded-lg outline-none bg-white dark:bg-slate-700 text-slate-800 dark:text-white">
                            </div>
                            <!-- Filter -->
                            <select id="date-filter" class="py-1.5 px-3 text-sm border border-slate-300 dark:border-slate-600 rounded-lg outline-none bg-white dark:bg-slate-700 text-slate-800 dark:text-white cursor-pointer">
                                <option value="all">အားလုံး</option>
                                <option value="today">ယနေ့</option>
                                <option value="week">ဒီတစ်ပတ်</option>
                                <option value="month">ဒီလ</option>
                            </select>
                            <!-- Sync Button -->
                            <button onclick="fetchFromGoogleSheets()" id="sync-btn" class="p-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-lg hover:bg-indigo-100 transition-colors" title="Google Sheet မှ ပြန်လည်ဆွဲယူမည်">
                                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            </button>
                            <!-- Clear All -->
                            <button id="clear-all" class="p-1.5 bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 rounded-lg hover:bg-red-100 transition-colors hidden" title="အားလုံးဖျက်မည်">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <!-- List Container -->
                    <div id="expense-list" class="custom-scrollbar flex-1 overflow-y-auto pr-2 space-y-3">
                        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 space-y-3 py-10">
                            <i data-lucide="search-x" class="w-16 h-16 opacity-50"></i>
                            <p>စာရင်း မရှိသေးပါ</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50">
        <i data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-message">အောင်မြင်ပါသည်။</span>
    </div>

    <!-- Application Logic -->
    <script>
        // ==========================================
        // 🚨 သင်၏ Google Apps Script URL ကို အောက်တွင် ထည့်ပါ။
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1PfFHg_8JMhBYXF1zZ3DzdpNJP1n0hFVCuRMMGj8iRY57PmrUynU8YcdfBjTw6wG-/exec';

        // Init
        lucide.createIcons();

        // Theme Setup
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const isDarkMode = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (isDarkMode) { document.documentElement.classList.add('dark'); themeIcon.setAttribute('data-lucide', 'sun'); } 
        else { document.documentElement.classList.remove('dark'); themeIcon.setAttribute('data-lucide', 'moon'); }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDarkNow = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDarkNow ? 'dark' : 'light');
            themeIcon.setAttribute('data-lucide', isDarkNow ? 'sun' : 'moon');
            lucide.createIcons();
            updateCharts();
        });

        // Data Setup
        let transactions = JSON.parse(localStorage.getItem('myTransactions')) || [];
        let monthlyBudget = Number(localStorage.getItem('myBudget')) || 0;

        // DOM Elements
        const form = document.getElementById('expense-form');
        const listContainer = document.getElementById('expense-list');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const dateFilter = document.getElementById('date-filter');
        const clearAllBtn = document.getElementById('clear-all');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // Dynamic Categories
        const categories = {
            expense: ['အစားအသောက်', 'သွားလာရေး', 'အိမ်သုံးစရိတ်', 'ဖျော်ဖြေရေး', 'ကျန်းမာရေး', 'အခြား'],
            income: ['လစာ', 'အပိုဆုငွေ', 'စီးပွားရေး', 'အခြား']
        };

        const updateCategoryOptions = () => {
            const type = document.querySelector('input[name="trans_type"]:checked').value;
            document.getElementById('category').innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('');
            
            const descContainer = document.getElementById('desc-container');
            const descInput = document.getElementById('desc');
            if (type === 'income') {
                descContainer.classList.add('hidden');
                descInput.removeAttribute('required');
            } else {
                descContainer.classList.remove('hidden');
                descInput.setAttribute('required', 'true');
            }
        };

        document.getElementsByName('trans_type').forEach(r => r.addEventListener('change', updateCategoryOptions));
        updateCategoryOptions();
        document.getElementById('date').valueAsDate = new Date();

        // Utilities
        const formatMoney = (amount) => amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        
        const getCategoryIcon = (cat) => {
            const map = { 'အစားအသောက်':'utensils', 'သွားလာရေး':'car', 'အိမ်သုံးစရိတ်':'home', 'ဖျော်ဖြေရေး':'gamepad-2', 'ကျန်းမာရေး':'activity', 'လစာ':'banknote', 'အပိုဆုငွေ':'gift', 'စီးပွားရေး':'briefcase' };
            return map[cat] || 'tag';
        };

        const showToast = (msg, type = 'success') => {
            toastMessage.textContent = msg;
            toast.className = `fixed bottom-5 right-5 transform transition-all duration-300 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 ${type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500')}`;
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        };

        // Budget Logic
        window.setBudget = () => {
            const amt = prompt('တစ်လစာ ဘတ်ဂျက် ပမာဏ သတ်မှတ်ပါ (ကျပ်)', monthlyBudget > 0 ? monthlyBudget : '');
            if(amt !== null && !isNaN(amt)) {
                monthlyBudget = Number(amt);
                localStorage.setItem('myBudget', monthlyBudget);
                renderApp();
                showToast('ဘတ်ဂျက် သတ်မှတ်ပြီးပါပြီ။');
            }
        };

        const updateBudgetUI = (currentMonthExpense) => {
            const budgetUsedEl = document.getElementById('budget-used');
            const budgetTotalEl = document.getElementById('budget-total');
            const budgetBar = document.getElementById('budget-bar');
            const budgetPercent = document.getElementById('budget-percent');

            budgetUsedEl.textContent = formatMoney(currentMonthExpense);
            
            if(monthlyBudget > 0) {
                budgetTotalEl.textContent = formatMoney(monthlyBudget);
                let percent = (currentMonthExpense / monthlyBudget) * 100;
                let displayPercent = Math.min(percent, 100).toFixed(0);
                budgetPercent.textContent = `${displayPercent}%`;
                budgetBar.style.width = `${displayPercent}%`;

                // Warning colors
                if(percent >= 100) {
                    budgetBar.classList.replace('bg-amber-500', 'bg-red-500');
                    budgetPercent.classList.add('text-red-500');
                } else if(percent >= 80) {
                    budgetBar.classList.replace('bg-emerald-500', 'bg-amber-500');
                    budgetBar.classList.replace('bg-red-500', 'bg-amber-500');
                    budgetPercent.classList.remove('text-red-500');
                } else {
                    budgetBar.classList.replace('bg-amber-500', 'bg-emerald-500');
                    budgetBar.classList.replace('bg-red-500', 'bg-emerald-500');
                    budgetPercent.classList.remove('text-red-500');
                }
            } else {
                budgetTotalEl.textContent = 'မသတ်မှတ်ရသေး';
                budgetPercent.textContent = '0%';
                budgetBar.style.width = '0%';
                budgetBar.className = 'bg-amber-500 h-2.5 rounded-full transition-all duration-500';
            }
        };

        // Data Filtering
        const getFilteredData = () => {
            let data = [...transactions];
            const query = searchInput.value.toLowerCase();
            const filter = dateFilter.value;
            const now = new Date();

            // Search Filter
            if(query) {
                data = data.filter(t => t.desc.toLowerCase().includes(query) || t.category.toLowerCase().includes(query));
            }

            // Date Filter
            if(filter !== 'all') {
                data = data.filter(t => {
                    const d = new Date(t.date);
                    if(filter === 'today') return d.toDateString() === now.toDateString();
                    if(filter === 'week') {
                        const pastWeek = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7);
                        return d >= pastWeek && d <= now;
                    }
                    if(filter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    return true;
                });
            }
            return data;
        };

        // Charts Management
        let barChart = null;
        let pieChart = null;

        const updateCharts = () => {
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b';
            const gridColor = isDark ? '#334155' : '#e2e8f0';
            const filteredData = getFilteredData(); // Use filtered data for charts too!

            // --- Bar Chart Logic ---
            const dateMap = {};
            filteredData.forEach(t => {
                if(!dateMap[t.date]) dateMap[t.date] = { income: 0, expense: 0 };
                if(t.type === 'income') dateMap[t.date].income += Number(t.amount);
                else dateMap[t.date].expense += Number(t.amount);
            });
            const sortedDates = Object.keys(dateMap).sort((a,b) => new Date(a) - new Date(b)).slice(-7);
            
            if(barChart) barChart.destroy();
            barChart = new Chart(document.getElementById('myChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: sortedDates.length ? sortedDates : ['No Data'],
                    datasets: [
                        { label: 'ဝင်ငွေ', data: sortedDates.map(d => dateMap[d].income), backgroundColor: '#10b981', borderRadius: 4 },
                        { label: 'ထွက်ငွေ', data: sortedDates.map(d => dateMap[d].expense), backgroundColor: '#ef4444', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: textColor }, grid: { display: false } },
                        y: { ticks: { color: textColor }, grid: { color: gridColor } }
                    }
                }
            });

            // --- Pie Chart Logic (Expenses only) ---
            const catMap = {};
            filteredData.filter(t => t.type === 'expense').forEach(t => {
                catMap[t.category] = (catMap[t.category] || 0) + Number(t.amount);
            });
            const pieLabels = Object.keys(catMap);
            const pieData = Object.values(catMap);
            
            // Generate vibrant colors
            const pieColors = ['#f43f5e', '#8b5cf6', '#3b82f6', '#10b981', '#f59e0b', '#64748b'];

            if(pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById('categoryChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: pieLabels.length ? pieLabels : ['No Expense'],
                    datasets: [{
                        data: pieData.length ? pieData : [1],
                        backgroundColor: pieData.length ? pieColors : ['#e2e8f0'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: textColor, font: { family: 'Padauk', size: 10 }, boxWidth: 12 } }
                    },
                    cutout: '65%'
                }
            });
        };

        // Main Render Loop
        const renderApp = () => {
            const displayData = getFilteredData();

            // 1. Update Totals (Based on filtered data)
            const totalIn = displayData.filter(t => t.type === 'income').reduce((s, i) => s + Number(i.amount), 0);
            const totalEx = displayData.filter(t => t.type === 'expense').reduce((s, i) => s + Number(i.amount), 0);
            const bal = totalIn - totalEx;

            document.getElementById('total-income').textContent = formatMoney(totalIn);
            document.getElementById('total-amount').textContent = formatMoney(totalEx);
            document.getElementById('total-balance').textContent = formatMoney(bal);

            // 2. Update Budget (Always based on ALL current month data, regardless of filter)
            const now = new Date();
            const currentMonthExpense = transactions.filter(t => {
                const d = new Date(t.date);
                return t.type === 'expense' && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).reduce((s, i) => s + Number(i.amount), 0);
            
            updateBudgetUI(currentMonthExpense);

            // Check Budget Alert
            if(monthlyBudget > 0 && currentMonthExpense > monthlyBudget && transactions.length > 0) {
                // simple visual cue if exceeded
                document.getElementById('total-amount').parentElement.classList.add('border-red-500', 'border-2');
            } else {
                document.getElementById('total-amount').parentElement.classList.remove('border-red-500', 'border-2');
            }

            // 3. Render List
            listContainer.querySelectorAll('.record-item').forEach(e => e.remove());
            
            if (displayData.length === 0) {
                emptyState.style.display = 'flex';
                clearAllBtn.classList.add('hidden');
            } else {
                emptyState.style.display = 'none';
                clearAllBtn.classList.remove('hidden');
                
                // Sort Newest first
                displayData.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'record-item bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-3 md:p-4 rounded-xl shadow-sm flex items-center justify-between hover:shadow-md transition-shadow group';
                    
                    const isInc = item.type === 'income';
                    el.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center text-slate-500 dark:text-slate-400 shrink-0">
                                <i data-lucide="${getCategoryIcon(item.category)}" class="w-5 h-5"></i>
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-bold text-slate-800 dark:text-slate-100 truncate text-sm md:text-base">${item.desc}</h3>
                                <div class="flex items-center gap-2 text-[10px] md:text-xs text-slate-500 dark:text-slate-400 mt-0.5 md:mt-1">
                                    <span class="bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded-full">${item.category}</span>
                                    <span>•</span><span>${item.date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 md:gap-4 shrink-0">
                            <span class="font-bold text-sm md:text-base ${isInc ? 'text-emerald-500' : 'text-red-500'}">${isInc?'+':'-'} ${formatMoney(item.amount)}</span>
                            <button onclick="deleteExpense('${item.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-1.5 md:p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20 md:opacity-0 group-hover:opacity-100">
                                <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(el);
                });
            }
            lucide.createIcons();
            updateCharts();
        };

        // Event Listeners for Filters
        searchInput.addEventListener('input', renderApp);
        dateFilter.addEventListener('change', renderApp);

        // Save Local
        const saveData = () => localStorage.setItem('myTransactions', JSON.stringify(transactions));

        // Delete Record
        window.deleteExpense = (id) => {
            transactions = transactions.filter(i => i.id !== id);
            saveData();
            renderApp();
            showToast('မှတ်တမ်းကို ဖျက်လိုက်ပါပြီ။', 'success');
        };

        // Clear All
        clearAllBtn.addEventListener('click', () => {
            if(confirm('မှတ်တမ်းအားလုံးကို ဖျက်ပစ်ဖို့ သေချာပါသလား?')) {
                transactions = [];
                saveData();
                renderApp();
                showToast('အားလုံးကို ဖျက်လိုက်ပါပြီ။', 'success');
            }
        });

        // 🚨 1. Add Record (POST to Google Sheet)
        const saveToGoogleSheets = async (transaction) => {
            if(!SCRIPT_URL) return;
            try {
                fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(transaction)
                });
            } catch (e) { console.error(e); }
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> မှတ်သားနေသည်...';
            btn.disabled = true; lucide.createIcons();

            const type = document.querySelector('input[name="trans_type"]:checked').value;
            const cat = document.getElementById('category').value;
            let desc = document.getElementById('desc').value;
            if (type === 'income') desc = cat; 

            const newItem = {
                id: Date.now().toString(),
                type, desc,
                amount: Number(document.getElementById('amount').value),
                category: cat,
                date: document.getElementById('date').value
            };

            transactions.push(newItem);
            saveData();
            renderApp();
            saveToGoogleSheets(newItem);

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            document.getElementById(type === 'expense' ? 'desc' : 'amount').focus();

            btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
            showToast('မှတ်တမ်းသစ် ထည့်သွင်းပြီးပါပြီ။');
            
            // Check if budget exceeded after adding
            if(monthlyBudget > 0 && type === 'expense') {
                const currentMonthEx = transactions.filter(t => t.type === 'expense' && t.date.startsWith(new Date().toISOString().slice(0,7))).reduce((s,i) => s + Number(i.amount), 0);
                if(currentMonthEx > monthlyBudget) showToast('သတိပေးချက်: သတ်မှတ်ထားသော ဘတ်ဂျက်ထက် ကျော်လွန်နေပါပြီ!', 'warning');
            }
        });

        // 🚨 2. Fetch from Google Sheets (Two-Way Sync)
        window.fetchFromGoogleSheets = async () => {
            if(!SCRIPT_URL) { showToast('URL မရှိပါ', 'error'); return; }
            const syncBtn = document.getElementById('sync-btn');
            syncBtn.querySelector('i').classList.add('animate-spin');
            
            try {
                // To fetch data properly, your Google Script needs a doGet function.
                const response = await fetch(SCRIPT_URL);
                const cloudData = await response.json();
                
                if(cloudData && cloudData.length > 0) {
                    const localIds = new Set(transactions.map(t => String(t.id)));
                    let addedCount = 0;
                    
                    cloudData.forEach(row => {
                        // Ensure ID format matches and isn't duplicated
                        if(!localIds.has(String(row.id)) && row.id) {
                            transactions.push({
                                id: String(row.id),
                                date: row.date,
                                type: row.type || 'expense',
                                category: row.category,
                                desc: row.desc,
                                amount: Number(row.amount)
                            });
                            addedCount++;
                        }
                    });

                    if(addedCount > 0) {
                        saveData();
                        renderApp();
                        showToast(`မှတ်တမ်းအဟောင်း ${addedCount} ခု ဆွဲယူပြီးပါပြီ။`);
                    } else {
                        showToast('အသစ်ထပ်မံ ဆွဲယူရန် မရှိပါ။');
                    }
                } else {
                    showToast('Google Sheet တွင် မှတ်တမ်း မရှိသေးပါ။');
                }
            } catch (error) {
                console.error(error);
                showToast('Google Sheet မှ ဆွဲယူရာတွင် အခက်အခဲရှိပါသည်။', 'error');
            }
            syncBtn.querySelector('i').classList.remove('animate-spin');
        };

        // Initialize
        renderApp();

    </script>
</body>
</html>
